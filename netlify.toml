[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Public client keys (safe to expose — same anon key the iOS app ships). The
  # RevenueCat SECRET key is intentionally NOT here; set REVENUECAT_SECRET_KEY in
  # the Netlify UI (server-only) to enable cross-platform entitlement checks.
